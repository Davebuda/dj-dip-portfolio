<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/dip-logo.png" />
    <link rel="apple-touch-icon" href="/images/dip-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DJ DiP — Urban Sound Fusion | Oslo DJ &amp; Event Architect</title>
    <meta name="description" content="DJ DiP — Prime-time, high-energy sets rooted in Urban Sound Fusion. HipHop &amp; RnB, Afrobeats, Shatta, Amapiano. Oslo-based DJ &amp; Event Architect. Booking &amp; Press Kit." />
    <link rel="canonical" href="https://djdip.no/" />

    <!-- Open Graph -->
    <meta property="og:type" content="profile" />
    <meta property="og:title" content="DJ DiP — Urban Sound Fusion" />
    <meta property="og:description" content="Prime-time, high-energy sets rooted in Urban Sound Fusion. Based in Oslo. HipHop &amp; RnB, Afrobeats, Shatta, Amapiano." />
    <meta property="og:url" content="https://djdip.no/" />
    <meta property="og:image" content="https://djdip.no/images/hero.png" />
    <meta property="og:site_name" content="DJ DiP" />
    <meta property="profile:username" content="djdip" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DJ DiP — Urban Sound Fusion" />
    <meta name="twitter:description" content="Prime-time, high-energy sets rooted in Urban Sound Fusion. Based in Oslo." />
    <meta name="twitter:image" content="https://djdip.no/images/hero.png" />

    <!-- JSON-LD: Person -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "DJ DiP",
      "jobTitle": "DJ & Event Architect",
      "description": "Prime-time, high-energy DJ based in Oslo. Specialising in Urban Sound Fusion — HipHop & RnB, Afrobeats, Shatta, Amapiano.",
      "url": "https://djdip.no",
      "image": "https://djdip.no/images/dip-portrait.png",
      "knowsAbout": ["HipHop", "RnB", "Afrobeats", "Shatta", "Amapiano", "Urban Sound Fusion"],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Oslo",
        "addressCountry": "NO"
      }
    }
    </script>

    <!-- Clash Display · Cabinet Grotesk · Satoshi via Fontshare -->
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@300,400,500,700&display=swap"
      rel="stylesheet"
    />

    <!-- DM Mono + Permanent Marker via Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
  </head>
